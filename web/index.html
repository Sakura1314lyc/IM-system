<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IM System Web UI</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>IM System</h1>
        <p>轻量即时通信</p>
      </div>

      <section class="profile card">
        <label for="username">昵称</label>
        <div class="row">
          <input id="username" type="text" placeholder="例如：alice" />
          <button id="renameBtn">修改</button>
        </div>
      </section>

      <section class="online card">
        <div class="section-title">
          <h2>在线用户</h2>
          <button id="refreshBtn" class="text-btn">刷新</button>
        </div>
        <ul id="onlineList">
          <li>alice</li>
          <li>bob</li>
          <li>charlie</li>
        </ul>
      </section>

      <section class="tips card">
        <h2>协议快捷键</h2>
        <p><code>who</code>：查询在线用户</p>
        <p><code>rename|新名</code>：修改用户名</p>
        <p><code>to|用户|消息</code>：私聊</p>
      </section>
    </aside>

    <main class="chat-panel">
      <header class="chat-header card">
        <div>
          <h2>聊天室</h2>
          <p>支持公聊与私聊模式切换</p>
        </div>
        <div class="mode-switch">
          <button class="mode active" data-mode="public">公聊</button>
          <button class="mode" data-mode="private">私聊</button>
        </div>
      </header>

      <section id="messageList" class="messages card">
        <div class="msg system">欢迎来到 IM System Web UI（原型界面）</div>
        <div class="msg incoming"><span class="sender">bob：</span>你好，今天讨论哪个需求？</div>
        <div class="msg outgoing">先把 UI 原型搭起来，后面再接 TCP 网关。</div>
      </section>

      <footer class="composer card">
        <div class="row" id="privateRow" hidden>
          <label for="toUser">私聊对象</label>
          <input id="toUser" type="text" placeholder="输入用户名" />
        </div>
        <div class="row">
          <textarea id="messageInput" rows="3" placeholder="输入消息后按发送..."></textarea>
          <button id="sendBtn" class="send">发送</button>
        </div>
      </footer>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
