<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IM System Web</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <h1>🌸 IM System</h1>
        <p>轻量即时通信</p>
      </div>

      <section class="profile card">
        <label for="username">👤 用户名</label>
        <input id="username" type="text" placeholder="例如: alice" />
        <label for="password">🔒 密码</label>
        <input id="password" type="password" placeholder="例如: 123" />
        <button id="connectBtn">🔌 连接</button>
        <p class="hint">默认用户: alice/bob/charlie 密码均为 123</p>
      </section>

      <section class="online card">
        <div class="section-title">
          <h2>👥 在线用户</h2>
          <button id="refreshBtn" class="text-btn">🔄 刷新</button>
        </div>
        <ul id="onlineList">
          <li>alice</li>
          <li>bob</li>
          <li>charlie</li>
        </ul>
      </section>

      <section class="tips card">
        <h2>💖 协议快捷键</h2>
        <p><code>who</code>：查询在线用户</p>
        <p><code>rename|新名</code>：修改用户名</p>
        <p><code>to|用户|消息</code>：私聊</p>
      </section>
    </aside>

    <main class="main">
      <header class="card topbar">
        <div>
          <h2>💬 聊天室</h2>
          <p>支持公聊与私聊模式切换</p>
        </div>
        <div class="mode-switch">
          <button class="mode active" data-mode="public">🌟 公聊</button>
          <button class="mode" data-mode="private">💌 私聊</button>
          <button class="mode" data-mode="group">👥 群聊</button>
        </div>
      </header>

      <section id="messageList" class="messages card">
        <div class="msg system">🎉 欢迎来到 IM System Web UI,已连接后端服务并可与 CLI 客户端互通。</div>
      </section>

      <footer class="composer card">
        <div class="row" id="privateRow" hidden>
          <label for="toUser">💌 私聊对象</label>
          <input id="toUser" type="text" placeholder="输入用户名" />
        </div>
        <div class="row">
          <textarea id="messageInput" rows="3" placeholder="输入消息后按发送..."></textarea>
          <button id="sendBtn" class="send">🚀 发送</button>
        </div>
      </footer>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
