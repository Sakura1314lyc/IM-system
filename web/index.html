<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IM System Web</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="left">
      <div class="brand card">
        <h1>IM System</h1>
        <p id="statusText">状态：未连接</p>
      </div>

      <div class="card block">
        <h3>连接设置</h3>
        <label>网关地址</label>
        <input id="wsInput" value="http://127.0.0.1:8080" />
        <button id="connectBtn" class="btn primary">连接服务</button>
      </div>

      <div class="card block">
        <h3>个人设置</h3>
        <label>昵称</label>
        <div class="row">
          <input id="username" placeholder="例如 alice" />
          <button id="renameBtn" class="btn">改名</button>
        </div>
      </div>

      <div class="card block">
        <div class="row-between">
          <h3>在线用户</h3>
          <button id="refreshBtn" class="btn ghost">刷新</button>
        </div>
        <ul id="onlineList"></ul>
      </div>
    </aside>

    <main class="main">
      <header class="card topbar">
        <div>
          <h2>聊天室</h2>
          <p>真正联通后端：公聊/私聊/改名/who 都会发到 TCP 服务端</p>
        </div>
        <div class="modes">
          <button class="btn mode active" data-mode="public">公聊</button>
          <button class="btn mode" data-mode="private">私聊</button>
        </div>
      </header>

      <section id="messages" class="card messages"></section>

      <footer class="card composer">
        <div id="privateRow" class="row" hidden>
          <label for="toUser">私聊对象</label>
          <input id="toUser" placeholder="输入在线用户名" />
        </div>
        <div class="row">
          <textarea id="messageInput" rows="3" placeholder="输入消息，点击发送"></textarea>
          <button id="sendBtn" class="btn primary">发送</button>
        </div>
      </footer>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
